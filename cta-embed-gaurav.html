<style>
  :root {
    /* #A6D40D - verde lima neón, estilo cyberpunk */
    --primary: 74 88% 44%;
    --glow: 74 88% 44%;
  }

  .btn {
    all: unset;
    position: relative;
    display: inline-block;
    padding: 14px 52px;
    background: transparent;
    color: hsl(var(--primary));
    text-transform: uppercase;
    font-size: 24px;
    letter-spacing: 0.18em;
    border-radius: 100px;
    cursor: pointer;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Borde que gira */
  .btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 3px;
    background: conic-gradient(
      from 0deg,
      hsl(var(--glow)),
      hsl(74 88% 55%),
      transparent 120deg,
      transparent 240deg,
      hsl(var(--glow))
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    animation: spin-border 2.5s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: inherit;
    background:
      radial-gradient(circle at top left, hsl(74 88% 44% / 0.12), transparent 50%),
      radial-gradient(circle at bottom right, hsl(74 88% 55% / 0.1), transparent 50%),
      hsl(240 8% 4%);
    z-index: 1;
    pointer-events: none;
  }

  .btn .inner {
    position: absolute;
    inset: 3px;
    border-radius: inherit;
    background:
      radial-gradient(
        120px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        hsl(var(--primary) / 0.35),
        transparent 55%
      );
    opacity: 0;
    z-index: 2;
    transition: opacity 0.25s ease-out;
    pointer-events: none;
  }

  .btn span {
    position: relative;
    z-index: 3;
  }

  .btn:hover .inner {
    opacity: 1;
  }

  @keyframes spin-border {
    to {
      transform: rotate(360deg);
    }
  }
</style>

<button class="btn" onclick="window.top.location.href='https://tusitio.com/cta-destino'">
  <div class="inner" aria-hidden="true"></div>
  <span>YOURWEB</span>
</button>

<script>
  (function() {
    var btn = document.querySelector(".btn");
    var inner = btn.querySelector(".inner");
    btn.addEventListener("mousemove", function(e) {
      var rect = btn.getBoundingClientRect();
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top) / rect.height) * 100;
      inner.style.setProperty("--mouse-x", x + "%");
      inner.style.setProperty("--mouse-y", y + "%");
    });
  })();
</script>
